<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="customAlert" class="alert" style="display: none;"></div>

<div class="auth-container">
    <form id="createUserForm" autocomplete="off">
        <h1>Register User</h1>

        <div class="input-group">
            <input type="text" id="name" name="name" required>
            <label for="name">Full Name *</label>
        </div>

        <div class="input-group">
            <input type="email" id="email" name="email" required>
            <label for="email">Email *</label>
        </div>

        <div class="input-group">
            <input type="text" id="department" name="department" required>
            <label for="department">Department *</label>
        </div>

        <div class="input-group">
            <select id="role" name="role" required>
                <option value="">Select Role</option>
                <option value="MANAGER">Manager</option>
                <option value="BORROWER">Borrower</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>

        <div class="input-group">
            <input type="password" id="passwordHash" name="passwordHash" required>
            <label for="passwordHash">Password *</label>
        </div>

        <button type="submit" id="createUserBtn" class="submit-btn">
            Create User <span class="arrow">&#8594;</span>
        </button>
    </form>
</div>

<footer>
    <div class="footer-bottom">
        <a href="https://mecerintered.co.za/terms-and-conditions">Terms & Conditions</a>
        <a id="contactLink">Contact Us</a>
    </div>
</footer>


</body>
</html>
