<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECER INTER-ED | ASSET MANAGEMENT SYSTEM | Admin Dashboard | Asset Form</title>

<!-- External CSS -->
<link rel="stylesheet" href="styles.css">

<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: http://127.0.0.1:5500;
  connect-src http://localhost:8081 http://127.0.0.1:8081;
">

</head>
<body>

<!-- LOGO -->
<header class="header">
    <div class="logo">
        <i class="fa-brands fa-first-order-alt"></i>
        <img src="images\IMG-20260611-WA0000.jpg" alt="MECER INTER-ED Logo" class="logo-img">
    </div>
    <span class="header-text"> ASSET MANAGEMENT SYSTEM</span>
</header>

<div class="auth-container">

    <!-- UPDATE ASSET -->
        <form id="assetUpdateForm" autocomplete="off" method="post">

    <h1>Update Asset</h1>

    <!-- Title -->
    <div class="input-group">
        <input type="text" name="title" id="title" required>
        <label>Title</label>
    </div>

    <!-- Category -->
    <div class="input-group">
        <input type="text" name="category" id="category" required>
        <label>Category</label>
    </div>

    <!-- Serial Number -->
    <div class="input-group">
        <input type="text" name="serialNumber" id="serialNumber" required>
        <label>Serial Number</label>
    </div>

    <!-- Status -->
    <div class="input-group">
        <select name="status" id="status" required>
            <option value="">Select Status</option>
            <option value="AVAILABLE">AVAILABLE</option>
            <option value="LOANED">LOANED</option>
            <option value="DAMAGED">DAMAGED</option>
            <option value="RETIRED">RETIRED</option>
        </select>
        <label>Status</label>
    </div>

    <!-- Cost -->
    <div class="input-group">
        <input type="number" step="0.01" name="cost" id="cost" required>
        <label>Cost</label>
    </div>

    <!-- Location -->
    <div class="input-group">
        <input type="text" name="location" id="location" required>
        <label>Location</label>
    </div>

    <!-- Condition -->
    <div class="input-group">
        <input type="text" name="condition" id="condition" required>
        <label>Condition</label>
    </div>

    <!-- Photo Path -->
    <div id="dropZone" style="border:2px dashed #999;padding:20px;">
    Drag & drop image here
    </div>

    <input type="hidden" name="photoPath" id="photoPath">

    <button type="submit" id="submitAssetBtn" class="submit-btn">
        Submit Asset <span class="arrow">→</span>
    </button>

</form>

</div>

<!-- FOOTER -->
<footer>
    <div class="footer-bottom">
        <a href="https://mecerintered.co.za/terms-and-conditions">Terms & Conditions</a>
        <a id="contactLink">Contact Us</a>
    </div>
</footer>

<!-- CONTACT POPUP -->
<div id="contactPopup" class="popup">
    <h3>Contact Us</h3>
    <p><i class="fa-solid fa-envelope"></i> info@mecerintered.co.za</p>
    <p><i class="fa-solid fa-phone"></i> (+27) 10 730 0860</p>
    <button onclick="closePopup()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
