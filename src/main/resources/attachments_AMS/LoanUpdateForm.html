<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECER INTER-ED | ASSET MANAGEMENT SYSTEM | Update Loan</title>

<link rel="stylesheet" href="styles.css">

<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: http://127.0.0.1:5500;
  connect-src http://localhost:8081 http://127.0.0.1:8081;
">
</head>

<body>

<header class="header">
    <div class="logo">
        <i class="fa-brands fa-first-order-alt"></i>
        <img src="images/IMG-20260611-WA0000.jpg" alt="Logo" class="logo-img">
    </div>
    <span class="header-text">ASSET MANAGEMENT SYSTEM</span>
</header>

<div class="auth-container">

    <form id="loanUpdateForm" autocomplete="off">

        <h1>Edit Loan</h1>

        <!-- READ ONLY DISPLAY SECTION -->
        <div class="input-group">
            <input type="text" id="loanId" readonly>
            <label>Loan ID</label>
        </div>

        <div class="input-group">
            <input type="text" id="userInfo" readonly>
            <label>User</label>
        </div>

        <div class="input-group">
            <input type="text" id="assetInfo" readonly>
            <label>Asset</label>
        </div>

        <div class="input-group">
            <input type="text" id="requestDate" readonly>
            <label>Request Date</label>
        </div>

        <!-- EDITABLE SECTION -->
        <div class="input-group">
            <select id="status" required>
                <option value="PENDING">PENDING</option>
                <option value="APPROVED">APPROVED</option>
                <option value="REJECTED">REJECTED</option>
            </select>
            <label>Status</label>
        </div>

        <div class="input-group">
            <input type="datetime-local" id="dueDate">
            <label>Due Date</label>
        </div>

        <div class="input-group">
            <input type="datetime-local" id="returnDate">
            <label>Return Date</label>
        </div>

        <button type="submit" class="submit-btn">
            Save Changes <span class="arrow">→</span>
        </button>

    </form>

</div>

<footer>
    <div class="footer-bottom">
        <a href="https://mecerintered.co.za/terms-and-conditions">Terms & Conditions</a>
        <a id="contactLink">Contact Us</a>
    </div>
</footer>

<script src="loanUpdate.js"></script>
</body>
</html>
